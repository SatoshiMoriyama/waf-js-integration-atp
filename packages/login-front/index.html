<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ログイン(JS統合あり)</title>
    <script
      src="https://a4fade6b6ca3.ap-northeast-1.sdk.awswaf.com/a4fade6b6ca3/ae80b320fe33/challenge.js"
      defer
      onerror="console.warn('challenge.js未設定のため通常のfetchで動作します')"
    ></script>
  </head>
  <body>
    <h2>ログイン(JS統合あり)</h2>
    <input
      id="username"
      placeholder="username"
      value="test@example.com"
    /><br />
    <input
      id="password"
      type="password"
      placeholder="password"
      value="password123"
    /><br />
    <button onclick="login()">ログイン</button>
    <pre id="result"></pre>

    <script>
      // TODO: CDKデプロイ後に出力されるLoginApiUrlに置き換える
      const API_URL =
        "https://kq2oc5ecbe.execute-api.ap-northeast-1.amazonaws.com/prod/login";

      async function login() {
        const resultEl = document.getElementById("result");
        resultEl.textContent = "送信中...";

        const body = JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        });

        // AwsWafIntegration.fetch がWAFトークンを自動付与してリクエストする
        // (challenge.jsが未設定/未読み込みの場合は通常のfetchにフォールバック)
        const fetchFn =
          typeof AwsWafIntegration !== "undefined"
            ? AwsWafIntegration.fetch
            : fetch;

        try {
          const res = await fetchFn(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body,
          });

          const text = await res.text();
          const label = res.ok ? "OK" : "NG (WAFにブロックされた可能性があります)";
          resultEl.textContent = `[${label}] Status: ${res.status}\n${text}`;
        } catch (err) {
          // ネットワークエラーやCORSブロックなどでfetch自体が失敗した場合もここで表示する
          resultEl.textContent = `[エラー] ${err.name}: ${err.message}`;
        }
      }
    </script>
  </body>
</html>
